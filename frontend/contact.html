<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-0WEBRN8YMC"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-0WEBRN8YMC');
    </script>
    <link rel="icon" type="image/png" href="/uno logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us - UNO With Friends</title>
    <link rel="canonical" href="https://unomultiplayer.me/contact" />
    <meta name="description" content="Get in touch with the UNO With Friends developer. Report bugs or send me your feedback." />
    <link rel="stylesheet" href="/src/index.css" />
  </head>
  <body class="min-h-[100dvh] bg-[#f8fafc] text-[#0f172a] font-sans flex flex-col items-center justify-center py-12 px-4 select-text">
    <div class="fixed top-4 left-4 z-50 pointer-events-auto select-none flex flex-col items-start gap-1.5 beta-pill-container">
      <div class="bg-[#64748b] text-white border-2 border-[#0f172a] px-2.5 py-1 rounded-[6px] shadow-[2px_2px_0_#0f172a] font-black text-[9px] tracking-wider uppercase cursor-help transition-all hover:-translate-y-0.5 active:translate-y-0 active:shadow-[1px_1px_0_#0f172a]">
        Beta 1.2
      </div>
      <div class="hidden beta-pill-tooltip bg-white text-[#0f172a] border-2 border-[#0f172a] p-3 rounded-[8px] shadow-[3px_3px_0_#0f172a] max-w-[220px] text-left">
        <p class="text-[10px] font-bold leading-normal">
          The game is in beta. Some features might not work; they will come soon. There may be some bugs and glitches, so please bear with me!
        </p>
      </div>
    </div>
    <div class="max-w-xl w-full text-center flex flex-col items-center my-auto">
      <div class="relative bg-white border-3 border-[#0f172a] rounded-[20px] pt-12 pb-6 px-6 sm:px-8 shadow-[8px_8px_0_#0f172a] w-full text-left">
        <div class="absolute left-6 -top-5.5 bg-[#ecd407] border-2 border-[#0f172a] px-5 py-2.5 rounded-[8px] shadow-[2px_2px_0_#0f172a]">
          <h1 class="text-[#0f172a] font-black text-xs tracking-wider uppercase select-none">
            Contact Us
          </h1>
        </div>
        <a href="/" title="Back to Main Menu" class="absolute right-6 -top-5.5 bg-white hover:bg-[#ecd407] hover:text-[#0f172a] text-[#0f172a] border-2 border-[#0f172a] px-3.5 py-2.5 rounded-[8px] shadow-[2px_2px_0_#0f172a] transition-all duration-180 ease-in-out cursor-pointer flex items-center gap-1.5 no-underline">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
          <span class="font-bold text-xs tracking-wider uppercase select-none">Back</span>
        </a>
        <p class="text-xs sm:text-sm font-bold text-neutral-muted leading-relaxed mb-6 mt-4">
          Have feedback, found a bug, or want to contribute? Send me a message using the form below!
        </p>
        <form id="contactForm" class="space-y-6" novalidate>
          <div id="nameContainer" class="relative w-full brutalist-container" style="margin-top: 36px; margin-bottom: 12px;">
            <input id="nameInput" placeholder="ENTER YOUR NAME" class="brutalist-input w-full" style="--input-shadow-color: #0956bf;" required />
            <label id="nameLabel" class="brutalist-label bg-[#0956bf]">Name</label>
          </div>
          <div id="emailContainer" class="relative w-full brutalist-container" style="margin-top: 48px; margin-bottom: 12px;">
            <input id="emailInput" type="email" placeholder="ENTER YOUR EMAIL" class="brutalist-input w-full" style="--input-shadow-color: #379711;" required />
            <label id="emailLabel" class="brutalist-label bg-[#379711]">Email</label>
          </div>
          <div id="messageContainer" class="relative w-full brutalist-container" style="margin-top: 48px; margin-bottom: 12px;">
            <textarea id="messageInput" placeholder="ENTER YOUR MESSAGE" rows="4" class="brutalist-input w-full min-h-[100px] py-3 resize-none" style="--input-shadow-color: #ecd407;" required></textarea>
            <label id="messageLabel" class="brutalist-label bg-[#ecd407]">Message</label>
          </div>
          <button type="submit" class="btn-3d w-full mt-4">
            <span class="btn-3d-shadow"></span>
            <span class="btn-3d-edge btn-3d-edge-green"></span>
            <div class="btn-3d-front btn-3d-front-green flex items-center justify-center font-black uppercase tracking-wider text-xs text-white h-12">
              Send Message
            </div>
          </button>
        </form>
      </div>
    </div>
    <!-- Custom Brutalist Modal Container -->
    <div id="brutalistModal" class="fixed inset-0 z-[600] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm hidden">
      <div class="relative bg-white border-3 border-[#0f172a] rounded-[24px] p-6 sm:p-8 shadow-[8px_8px_0_#0f172a] flex flex-col items-center max-w-sm w-full select-none transform transition-transform scale-95 duration-200">
        <!-- Title Header Pill -->
        <div id="modalTitlePill" class="absolute left-6 -top-5.5 bg-[#0956bf] border-2 border-[#0f172a] px-5 py-2 rounded-[8px] shadow-[2px_2px_0_#0f172a]">
          <h3 id="modalTitle" class="text-white font-black text-xs tracking-wider uppercase m-0 select-none">
            Notification
          </h3>
        </div>
        <!-- Modal Message -->
        <p id="modalMessage" class="text-xs sm:text-sm font-bold text-neutral-muted text-center mt-4 mb-6 leading-relaxed">
          Message contents here
        </p>
        <!-- Modal Action Button -->
        <button id="modalCloseBtn" class="btn-3d w-full">
          <span class="btn-3d-shadow"></span>
          <span class="btn-3d-edge btn-3d-edge-blue"></span>
          <div class="btn-3d-front btn-3d-front-blue flex items-center justify-center font-black uppercase tracking-wider text-xs text-white h-10">
            OK
          </div>
        </button>
      </div>
    </div>
    <script>
      const form = document.getElementById('contactForm');
      const nameInput = document.getElementById('nameInput');
      const nameContainer = document.getElementById('nameContainer');
      const nameLabel = document.getElementById('nameLabel');
      const emailInput = document.getElementById('emailInput');
      const emailContainer = document.getElementById('emailContainer');
      const emailLabel = document.getElementById('emailLabel');
      const messageInput = document.getElementById('messageInput');
      const messageContainer = document.getElementById('messageContainer');
      const messageLabel = document.getElementById('messageLabel');

      // Modal Elements
      const modal = document.getElementById('brutalistModal');
      const modalTitlePill = document.getElementById('modalTitlePill');
      const modalTitle = document.getElementById('modalTitle');
      const modalMessage = document.getElementById('modalMessage');
      const modalCloseBtn = document.getElementById('modalCloseBtn');
      const modalCloseBtnEdge = modalCloseBtn.querySelector('.btn-3d-edge');
      const modalCloseBtnFront = modalCloseBtn.querySelector('.btn-3d-front');
      let modalCallback = null;

      const showModal = (title, message, type = 'info', callback = null) => {
        modalTitle.textContent = title;
        modalMessage.textContent = message;
        modalCallback = callback;

        if (type === 'error') {
          modalTitlePill.className = 'absolute left-6 -top-5.5 bg-[#cc3333] border-2 border-[#0f172a] px-5 py-2 rounded-[8px] shadow-[2px_2px_0_#0f172a]';
          modalCloseBtnEdge.className = 'btn-3d-edge btn-3d-edge-red';
          modalCloseBtnFront.className = 'btn-3d-front btn-3d-front-red flex items-center justify-center font-black uppercase tracking-wider text-xs text-white h-10';
        } else if (type === 'success') {
          modalTitlePill.className = 'absolute left-6 -top-5.5 bg-[#379711] border-2 border-[#0f172a] px-5 py-2 rounded-[8px] shadow-[2px_2px_0_#0f172a]';
          modalCloseBtnEdge.className = 'btn-3d-edge btn-3d-edge-green';
          modalCloseBtnFront.className = 'btn-3d-front btn-3d-front-green flex items-center justify-center font-black uppercase tracking-wider text-xs text-white h-10';
        } else {
          modalTitlePill.className = 'absolute left-6 -top-5.5 bg-[#0956bf] border-2 border-[#0f172a] px-5 py-2 rounded-[8px] shadow-[2px_2px_0_#0f172a]';
          modalCloseBtnEdge.className = 'btn-3d-edge btn-3d-edge-blue';
          modalCloseBtnFront.className = 'btn-3d-front btn-3d-front-blue flex items-center justify-center font-black uppercase tracking-wider text-xs text-white h-10';
        }

        modal.classList.remove('hidden');
        setTimeout(() => {
          modal.firstElementChild.classList.remove('scale-95');
          modal.firstElementChild.classList.add('scale-100');
        }, 10);
      };

      modalCloseBtn.addEventListener('click', () => {
        modal.firstElementChild.classList.remove('scale-100');
        modal.firstElementChild.classList.add('scale-95');
        setTimeout(() => {
          modal.classList.add('hidden');
          if (modalCallback) {
            modalCallback();
          }
        }, 150);
      });

      const clearError = (input, container, label, originalLabelText, originalLabelBg) => {
        input.classList.remove('brutalist-input-error');
        container.classList.remove('animate-brutal-shake');
        label.textContent = originalLabelText;
        label.className = `brutalist-label ${originalLabelBg}`;
      };

      nameInput.addEventListener('input', () => clearError(nameInput, nameContainer, nameLabel, 'Name', 'bg-[#0956bf]'));
      emailInput.addEventListener('input', () => clearError(emailInput, emailContainer, emailLabel, 'Email', 'bg-[#379711]'));
      messageInput.addEventListener('input', () => clearError(messageInput, messageContainer, messageLabel, 'Message', 'bg-[#ecd407]'));

      const getBackendUrl = () => {
        let url = '';
        try {
          url = localStorage.getItem('uno_backend_url') || '';
        } catch (_) {}
        if (!url) {
          if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
            url = 'http://localhost:5000';
          } else {
            url = window.location.origin;
          }
        }
        return url;
      };

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        let hasError = false;
        if (!nameInput.value.trim()) {
          nameInput.classList.add('brutalist-input-error');
          nameContainer.classList.remove('animate-brutal-shake');
          void nameContainer.offsetWidth;
          nameContainer.classList.add('animate-brutal-shake');
          nameLabel.textContent = 'Name is Required!';
          nameLabel.className = 'brutalist-label bg-[#cc3333]';
          hasError = true;
        }
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailInput.value.trim()) {
          emailInput.classList.add('brutalist-input-error');
          emailContainer.classList.remove('animate-brutal-shake');
          void emailContainer.offsetWidth;
          emailContainer.classList.add('animate-brutal-shake');
          emailLabel.textContent = 'Email is Required!';
          emailLabel.className = 'brutalist-label bg-[#cc3333]';
          hasError = true;
        } else if (!emailRegex.test(emailInput.value.trim())) {
          emailInput.classList.add('brutalist-input-error');
          emailContainer.classList.remove('animate-brutal-shake');
          void emailContainer.offsetWidth;
          emailContainer.classList.add('animate-brutal-shake');
          emailLabel.textContent = 'Invalid Email Address!';
          emailLabel.className = 'brutalist-label bg-[#cc3333]';
          hasError = true;
        }
        if (!messageInput.value.trim()) {
          messageInput.classList.add('brutalist-input-error');
          messageContainer.classList.remove('animate-brutal-shake');
          void messageContainer.offsetWidth;
          messageContainer.classList.add('animate-brutal-shake');
          messageLabel.textContent = 'Message is Required!';
          messageLabel.className = 'brutalist-label bg-[#cc3333]';
          hasError = true;
        }
        if (!hasError) {
          const backendUrl = getBackendUrl();
          const submitBtn = form.querySelector('button[type="submit"]');
          const submitBtnFront = submitBtn.querySelector('.btn-3d-front');
          const originalText = submitBtnFront.textContent;
          submitBtnFront.textContent = 'SENDING...';
          submitBtn.disabled = true;

          fetch(`${backendUrl}/api/contact`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              name: nameInput.value.trim(),
              email: emailInput.value.trim(),
              message: messageInput.value.trim()
            })
          })
          .then(async (res) => {
            if (!res.ok) {
              const errData = await res.json().catch(() => ({}));
              throw new Error(errData.error || 'Failed to send message');
            }
            showModal('Success', 'Feedback received! Thank you for playing.', 'success', () => {
              window.location.href = '/';
            });
          })
          .catch((err) => {
            console.error('Error submitting form:', err);
            showModal('Submission Error', err.message || 'Failed to send message. Please try again later.', 'error');
            submitBtnFront.textContent = originalText;
            submitBtn.disabled = false;
          });
        }
      });
    </script>
  </body>
</html>
